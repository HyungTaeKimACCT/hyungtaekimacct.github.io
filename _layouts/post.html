---
layout: default
---

<section class="section">
    <div class="container">
        <article class="blog-post">
            <header class="post-header">
                <h1 class="post-title">{{ page.title }}</h1>
                <p class="post-meta">
                    <time datetime="{{ page.date | date_to_xmlschema }}">
                        {{ page.date | date: "%B %d, %Y" }}
                    </time>
                </p>
            </header>
            
            <div class="post-content content-card">
                {{ content }}
            </div>
            
            <footer class="post-footer">
                <p><a href="{{ '/accounting-issues' | relative_url }}" class="external-link">← Back to all posts</a></p>
            </footer>
        </article>
    </div>
</section>

<style>
.blog-post {
    max-width: 800px;
    margin: 0 auto;
}

.post-header {
    margin-bottom: 2rem;
}

.post-title {
    font-size: 2rem;
    color: var(--primary-color);
    margin-bottom: 0.5rem;
    font-weight: 600;
}

.post-meta {
    color: var(--text-light);
    font-size: 0.9rem;
}

.post-content {
    line-height: 1.8;
}

.post-content h2 {
    font-size: 1.5rem;
    color: var(--primary-color);
    margin-top: 2rem;
    margin-bottom: 1rem;
}

.post-content h3 {
    font-size: 1.25rem;
    color: var(--primary-color);
    margin-top: 1.5rem;
    margin-bottom: 0.75rem;
}

.post-content p {
    margin-bottom: 1rem;
}

.post-content ul, .post-content ol {
    margin-bottom: 1rem;
    padding-left: 2rem;
}

.post-content li {
    margin-bottom: 0.5rem;
}

.post-footer {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border-color);
}
</style>
