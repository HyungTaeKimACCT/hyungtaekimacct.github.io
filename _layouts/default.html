<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">{{ site.title }}</div>
            <ul class="nav-menu">
                <li><a href="{{ '/' | relative_url }}" class="nav-link">Home</a></li>
                <li><a href="{{ '/#research' | relative_url }}" class="nav-link">Research</a></li>
                <li><a href="{{ '/teaching' | relative_url }}" class="nav-link">Teaching</a></li>
                <li><a href="{{ '/accounting-issues' | relative_url }}" class="nav-link">Accounting Issues</a></li>
                <li><a href="{{ '/#contact' | relative_url }}" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    {{ content }}

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 {{ site.title }}. All rights reserved.</p>
            <p>Hosted on GitHub Pages</p>
        </div>
    </footer>

    <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
</body>
</html>
